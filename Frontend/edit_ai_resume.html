<div class="container py-5" style="margin-top: 50px;">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    <h2 class="mb-0">
                        ✨ Edit AI Resume
                    </h2>

                </div>

                <div class="card-body">

                    <form id="resumeForm">

                        <h4 class="mb-3 text-primary">
                            Personal Information
                        </h4>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" id="name" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Role</label>
                                <input type="text" id="role" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="email" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone</label>
                                <input type="text" id="phone" class="form-control">
                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Professional Summary
                            </label>

                            <textarea
                                id="summary"
                                rows="5"
                                class="form-control"></textarea>

                        </div>

                        <hr>

                        <h4 class="text-primary mb-3">
                            Technical Skills
                        </h4>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label>Languages</label>
                                <input type="text" id="languagesSkill" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Frontend</label>
                                <input type="text" id="frontendSkill" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Backend</label>
                                <input type="text" id="backendSkill" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Database</label>
                                <input type="text" id="databaseSkill" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Frameworks</label>
                                <input type="text" id="frameworkSkill" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Tools</label>
                                <input type="text" id="toolSkill" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Concepts</label>
                                <input type="text" id="conceptSkill" class="form-control">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Currently Learning</label>
                                <input type="text" id="learningSkill" class="form-control">
                            </div>

                        </div>

                        <hr>

                       <div class="d-flex justify-content-between align-items-center mb-3">

    <h4 class="text-primary mb-0">
        Experience
    </h4>

    <button
        type="button"
        id="addExperienceBtn"
        class="btn btn-success">

        <i class="bi bi-plus-circle"></i>
        Add Experience

    </button>

</div>

<div id="experienceContainer"></div>

                        <div class="text-end mt-4">

                            <button
                                type="button"
                                id="saveResume"
                                class="btn btn-primary btn-lg px-5">

                                💾 Save Changes

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
